<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Great+Vibes&display=swap');
        
        :root {
            --primary: #ff4d6d;
            --glow: #ff6b8a;
            --dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--dark);
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: white;
            height: 100vh;
            width: 100vw;
            cursor: none; /* Custom cursor */
        }

        #canvas-container { position: fixed; top: 0; left: 0; z-index: 1; }

        /* Custom Cursor */
        .cursor-dot, .cursor-ring {
            position: fixed;
            top: 0; left: 0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }
        .cursor-dot { width: 6px; height: 6px; background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .cursor-ring { width: 40px; height: 40px; border: 1px solid var(--glow); transition: width 0.3s, height 0.3s, border-color 0.3s; }

        /* UI Layer */
        .ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        
        .text-container { text-align: center; opacity: 0; transform: translateY(30px); }
        .main-title { font-family: 'Great Vibes', cursive; font-size: clamp(3rem, 10vw, 8rem); color: #fff; text-shadow: 0 0 20px var(--glow), 0 0 40px var(--primary); margin-bottom: 1rem; line-height: 1; }
        .sub-title { font-size: clamp(1rem, 3vw, 1.5rem); font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.7); border-top: 1px solid rgba(255,77,109,0.3); border-bottom: 1px solid rgba(255,77,109,0.3); padding: 1rem 0; max-width: 600px; margin: 0 auto; }
        
        .hidden { display: none !important; }

        .btn-enter {
            margin-top: 3rem;
            padding: 1rem 3rem;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-family: 'Space Grotesk';
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: none;
            position: relative;
            overflow: hidden;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            transition: color 0.5s, background 0.5s;
        }
        .btn-enter::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: -1; transform: translateX(-100%); transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1); }
        .btn-enter:hover { color: #000; }
        .btn-enter:hover::before { transform: translateX(0); }

        .music-toggle {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 100;
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,77,109,0.5);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s;
        }
        .music-toggle:hover { box-shadow: 0 0 20px var(--primary); border-color: var(--primary); }
        .music-toggle svg { width: 20px; height: 20px; stroke: var(--primary); }

        .credit { position: fixed; bottom: 1rem; left: 1rem; font-size: 0.7rem; opacity: 0.3; letter-spacing: 0.1em; }
    </style>
</head>
<body>

<!-- Three.js Canvas will be injected here -->
<div id="canvas-container"></div>

<!-- UI Elements -->
<div class="ui-layer">
    <div class="text-container" id="textContainer">
        <h1 class="main-title" id="mainTitle">I asked the universe...</h1>
        <p class="sub-title" id="subTitle">It sent me you.</p>
        <button class="btn-enter" id="enterBtn">Enter Orbit</button>
    </div>
</div>

<!-- Music Toggle -->
<div class="music-toggle" id="musicToggle" title="Toggle Music">
    <svg xmlns="http://www.w3.org/2000/svg" id="musicIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
    <svg class="hidden" id="musicIconOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>
</div>

<audio id="bgMusic" loop>
    <!-- REPLACE THIS LINK WITH YOUR SONG -->
    <source src="https://assets.mixkit.co/music/preview/mixkit-romantic-serenade-607.mp3" type="audio/mpeg">
</audio>

<div class="credit">Made with Three.js & 💖</div>

<!-- Custom Cursor Elements -->
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Libraries -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "gsap": "https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
  }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import gsap from 'gsap';

    // --- CONFIG ---
    const PARTICLE_COUNT = 6000;
    const HEART_SIZE = 8;
    const COLORS = {
        heart: 0xff4d6d,
        aura: 0xff99aa,
        space: 0x0a0a0f
    };

    // --- SCENE SETUP ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 20;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // --- CUSTOM CURSOR ---
    const cursorDot = document.getElementById('cursorDot');
    const cursorRing = document.getElementById('cursorRing');
    let mouse = new THREE.Vector2();
    let targetMouse = new THREE.Vector2();
    
    window.addEventListener('mousemove', (e) => {
        targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        
        cursorDot.style.left = e.clientX + 'px';
        cursorDot.style.top = e.clientY + 'px';
        cursorRing.style.left = e.clientX + 'px';
        cursorRing.style.top = e.clientY + 'px';
    });

    // --- HEART MATH (Parametric Equation) ---
    function getHeartPosition(u, v) {
        // u: 0 to PI * 2 (rotation)
        // v: 0 to PI (depth)
        const x = 16 * Math.pow(Math.sin(u), 3);
        const y = 13 * Math.cos(u) - 5 * Math.cos(2 * u) - 2 * Math.cos(3 * u) - Math.cos(4 * u);
        const z = v * 4; // Extrusion
        
        return new THREE.Vector3(x, y, z);
    }

    // --- PARTICLE SYSTEM ---
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const sizes = new Float32Array(PARTICLE_COUNT);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const alphas = new Float32Array(PARTICLE_COUNT);
    const velocities = []; // For explosion physics
    const originalPositions = [];

    const colorHeart = new THREE.Color(COLORS.heart);
    const colorAura = new THREE.Color(COLORS.aura);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        // Parametric coords
        const u = Math.random() * Math.PI * 2;
        const v = (Math.random() - 0.5) * 2; // -1 to 1
        
        const pos = getHeartPosition(u, v);
        pos.multiplyScalar(HEART_SIZE / 16); // Scale down

        // Store original pos
        originalPositions.push(pos.clone());
        
        positions[i * 3] = pos.x;
        positions[i * 3 + 1] = pos.y;
        positions[i * 3 + 2] = pos.z;

        // Random size
        sizes[i] = Math.random() * 2 + 0.5;
        
        // Color gradient
        colorHeart.lerp(colorAura, Math.random());
        colors[i * 3] = colorHeart.r;
        colors[i * 3 + 1] = colorHeart.g;
        colors[i * 3 + 2] = colorHeart.b;

        alphas[i] = 1.0;
        velocities.push(new THREE.Vector3(0,0,0));
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));

    // --- SHADER MATERIAL (Glowing Points) ---
    const material = new THREE.PointsMaterial({
        size: 0.1,
        vertexColors: true,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
    });

    // Custom Shader for better glow
    material.onBeforeCompile = (shader) => {
        shader.uniforms.uTime = { value: 0 };
        shader.uniforms.uMouse = { value: new THREE.Vector2(0,0) };
        shader.uniforms.uExplode = { value: 0 };
        
        shader.vertexShader = `
            attribute float size;
            attribute vec3 aColor;
            attribute float aAlpha;
            varying vec3 vColor;
            varying float vAlpha;
            uniform float uTime;
            uniform vec2 uMouse;
            uniform float uExplode;
            
            // Simple noise for floating
            float noise(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

            void main() {
                vColor = aColor;
                vAlpha = aAlpha;
                
                vec3 pos = position;
                
                // Floating animation
                float n = noise(vec2(position.x * 0.1 + uTime, position.y * 0.1));
                pos.z += sin(uTime + position.x) * 0.5;
                pos.y += cos(uTime + position.z) * 0.3;

                // Mouse Interaction (Attraction/Repulsion)
                vec2 mouse3D = uMouse * 10.0; 
                float dist = distance(pos.xy, mouse3D);
                if(dist < 5.0 && uExplode < 0.5) {
                    vec2 force = normalize(pos.xy - mouse3D) * (5.0 - dist) * 0.5;
                    pos.xy += force;
                }

                // Explosion Logic
                if(uExplode > 0.5) {
                    // This part handled in JS for physics, but we can add vertex jitter here
                }

                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_PointSize = size * (300.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        shader.fragmentShader = `
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
                float dist = length(gl_PointCoord - vec2(0.5));
                if(dist > 0.5) discard;
                
                float alpha = smoothstep(0.5, 0.0, dist) * vAlpha;
                // Glow effect
                vec3 glow = vColor * (1.0 + (1.0 - dist) * 2.0);
                
                gl_FragColor = vec4(glow, alpha);
            }
        `;
    };

    const heart = new THREE.Points(geometry, material);
    heart.rotation.x = -0.2; // Tilt it slightly
    scene.add(heart);

    // --- BACKGROUND STARS ---
    const starsGeo = new THREE.BufferGeometry();
    const starsCount = 2000;
    const starsPos = new Float32Array(starsCount * 3);
    for(let i=0; i<starsCount; i++) {
        const radius = 50 + Math.random() * 50;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        starsPos[i*3] = radius * Math.sin(phi) * Math.cos(theta);
        starsPos[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
        starsPos[i*3+2] = radius * Math.cos(phi);
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
    const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.5 });
    const stars = new THREE.Points(starsGeo, starsMat);
    scene.add(stars);

    // --- MUSIC ---
    const music = document.getElementById('bgMusic');
    const musicToggle = document.getElementById('musicToggle');
    const musicIcon = document.getElementById('musicIcon');
    const musicIconOff = document.getElementById('musicIconOff');
    let audioContext, analyser; 
    
    function initAudio() {
        if(audioContext) return;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaElementSource(music);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser).connect(audioContext.destination);
        music.play().catch(e => console.log("Autoplay blocked"));
    }
    
    musicToggle.addEventListener('click', () => {
        initAudio();
        if(music.paused) { music.play(); musicIcon.classList.remove('hidden'); musicIconOff.classList.add('hidden'); }
        else { music.pause(); musicIcon.classList.add('hidden'); musicIconOff.classList.remove('hidden'); }
    });

    // --- ANIMATION LOOP ---
    let time = 0;
    let isExploded = false;
    let explodeProgress = 0;

    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;

        // Smooth mouse follow for shader
        mouse.lerp(targetMouse, 0.1);
        material.uniforms.uTime.value = time;
        material.uniforms.uMouse.value.set(mouse.x, mouse.y);

        // Heart Rotation
        heart.rotation.y += 0.0005;
        stars.rotation.y -= 0.0001;

        // Audio Reactivity
        if(analyser) {
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const bass = (data[0] + data[1] + data[2]) / 3 / 255;
            heart.scale.setScalar(1 + bass * 0.1); // Pulsate
        }

        // Explosion Physics (JS driven for control)
        if(isExploded) {
            explodeProgress += 0.02;
            const posAttr = geometry.attributes.position;
            const velAttr = velocities; 
            
            for(let i=0; i<PARTICLE_COUNT; i++) {
                // Apply velocity
                posAttr.array[i*3] += velAttr[i].x;
                posAttr.array[i*3+1] += velAttr[i].y;
                posAttr.array[i*3+2] += velAttr[i].z;
                
                // Gravity/Drag
                velAttr[i].y -= 0.01; // Gravity
                velAttr[i].multiplyScalar(0.98); // Drag
            }
            posAttr.needsUpdate = true;

            if(explodeProgress > 3) { // Reform
                reformHeart();
            }
        }

        renderer.render(scene, camera);
    }

    function explodeHeart() {
        if(isExploded) return;
        isExploded = true;
        explodeProgress = 0;
        
        const posAttr = geometry.attributes.position;
        cursorRing.style.width = '100px';
        cursorRing.style.height = '100px';
        cursorRing.style.borderColor = '#fff';

        for(let i=0; i<PARTICLE_COUNT; i++) {
            // Random explosion velocity
            velocities[i].set(
                (Math.random()-0.5) * 0.5,
                (Math.random()-0.5) * 0.5 + 0.2, // Upwards bias
                (Math.random()-0.5) * 0.5
            );
        }
    }

    function reformHeart() {
        isExploded = false;
        explodeProgress = 0;
        cursorRing.style.width = '40px';
        cursorRing.style.height = '40px';
        cursorRing.style.borderColor = 'var(--glow)';
        
        gsap.to(velocities, { duration: 2, x: 0, y: 0, z: 0, ease: "power2.inOut" });
        
        // Animate positions back to original
        const posAttr = geometry.attributes.position;
        for(let i=0; i<PARTICLE_COUNT; i++) {
            gsap.to(posAttr.array, {
                duration: 2, 
                ease: "elastic.out(1, 0.5)",
                [`${i*3}`]: originalPositions[i].x,
                [`${i*3+1}`]: originalPositions[i].y,
                [`${i*3+2}`]: originalPositions[i].z,
                onUpdate: () => posAttr.needsUpdate = true
            });
        }
    }

    // --- GSAP TEXT ANIMATION ---
    const mainTitle = document.getElementById('mainTitle');
    const subTitle = document.getElementById('subTitle');
    const enterBtn = document.getElementById('enterBtn');
    const textContainer = document.getElementById('textContainer');

    const tl = gsap.timeline({ defaults: { ease: "power3.out" } });
    tl.to(textContainer, { opacity: 1, y: 0, duration: 1.5 })
      .from(mainTitle, { duration: 1.5, y: 50, opacity: 0, ease: "expo.out" }, "-=1")
      .from(subTitle, { duration: 1, y: 20, opacity: 0 }, "-=1")
      .from(enterBtn, { duration: 1, scale: 0.5, opacity: 0 }, "-=0.5");

    // --- EVENTS ---
    enterBtn.addEventListener('click', () => {
        initAudio();
        gsap.to(textContainer, { opacity: 0, y: -50, duration: 1, ease: "power3.in" });
        explodeHeart();
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
