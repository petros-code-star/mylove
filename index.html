<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>for you birtie ✨</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0f1e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      margin: 0;
      padding: 1rem;
    }

    .card {
      position: relative;
      width: 90%;
      max-width: 700px;
      background: rgba(255, 240, 245, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 4rem 4rem 3rem 3rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 235, 0.2);
      text-align: center;
      color: #fff0f5;
      transition: all 0.5s ease;
      animation: floatGlow 4s infinite alternate ease-in-out;
      z-index: 2;
    }

    @keyframes floatGlow {
      0% {
        transform: translateY(0px);
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 140, 180, 0.4);
      }
      100% {
        transform: translateY(-12px);
        box-shadow: 0 45px 65px rgba(0, 0, 0, 0.8), 0 0 45px rgba(255, 120, 160, 0.7);
      }
    }

    .moon-bg {
      position: absolute;
      top: -15%;
      right: -5%;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle at 30% 30%, #ffe9c4, #fbb6ce);
      border-radius: 50%;
      filter: blur(65px);
      opacity: 0.5;
      z-index: -1;
      animation: moonPulse 5s infinite alternate;
    }

    @keyframes moonPulse {
      0% { opacity: 0.4; transform: scale(0.9); }
      100% { opacity: 0.7; transform: scale(1.2); }
    }

    h1 {
      font-size: clamp(2.8rem, 10vw, 4.8rem);
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ffe6f0, #ffb7c5, #ff8da1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 0 20px #ff4470);
      animation: titleShine 2s infinite alternate;
    }

    @keyframes titleShine {
      0% { filter: drop-shadow(0 0 15px #ff6b8b); }
      100% { filter: drop-shadow(0 0 32px #ff3366); }
    }

    .sub-message {
      font-size: 1.4rem;
      font-weight: 300;
      margin: 0.5rem 0 1.8rem;
      color: #fec7d7;
      letter-spacing: 1px;
      animation: fadeSlide 2.6s ease-out;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .heart-container {
      margin: 1.2rem 0;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .heart {
      font-size: 2.8rem;
      animation: heartBeat 1.2s infinite ease-in-out;
      filter: drop-shadow(0 0 18px #ff3366);
      transform-origin: center;
    }

    .heart:nth-child(2) { animation-delay: 0.2s; }
    .heart:nth-child(3) { animation-delay: 0.4s; }
    .heart:nth-child(4) { animation-delay: 0.6s; }
    .heart:nth-child(5) { animation-delay: 0.8s; }

    @keyframes heartBeat {
      0% { transform: scale(1); }
      30% { transform: scale(1.35); }
      50% { transform: scale(1.1); }
      70% { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    .question-text {
      font-size: 2.4rem;
      font-weight: 500;
      margin: 1.8rem 0 0.8rem;
      background: linear-gradient(to right, #ffd9e6, #ffb7c5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .blinking-cursor {
      display: inline-block;
      width: 4px;
      height: 2.5rem;
      background: #ff8da1;
      margin-left: 6px;
      animation: blink 0.9s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 2.2rem 0 1rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 1rem 2.8rem;
      font-size: 1.5rem;
      font-weight: bold;
      border: none;
      border-radius: 4rem;
      background: rgba(255, 220, 230, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff0f5;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(255, 180, 180, 0.5);
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: rgba(255, 140, 160, 0.5);
      box-shadow: 0 0 35px #ff5e7e, 0 10px 25px black;
      transform: scale(1.07);
      color: white;
    }

    .btn:active {
      transform: scale(0.96);
    }

    #noBtn {
      transition: all 0.2s ease;
    }

    .hidden-message {
      margin-top: 2rem;
      font-size: 1.5rem;
      opacity: 0;
      transition: opacity 0.8s ease;
      color: #ffd0dd;
      min-height: 3.5rem;
      font-weight: 500;
      text-shadow: 0 0 10px #ff3366;
    }

    .audio-control {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #e0b0c0;
      background: rgba(0,0,0,0.4);
      padding: 0.4rem 1.5rem;
      border-radius: 30px;
      display: inline-block;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
    }

    .audio-control:hover {
      background: rgba(255, 120, 150, 0.3);
      color: white;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="starsCanvas"></canvas>

  <div class="card">
    <div class="moon-bg"></div>
    <h1>Hey you ✨</h1>
    <div class="sub-message">I have something to ask...</div>

    <div class="heart-container">
      <span class="heart">💖</span>
      <span class="heart">💗</span>
      <span class="heart">💘</span>
      <span class="heart">💝</span>
      <span class="heart">💕</span>
    </div>

    <div class="question-text">
      Will you be mine?<span class="blinking-cursor"></span>
    </div>

    <div class="button-group">
      <button class="btn" id="yesBtn">YES 💫</button>
      <button class="btn" id="noBtn">NO 🌙</button>
    </div>

    <div class="hidden-message" id="responseMessage"></div>
    <div class="audio-control" id="musicToggle">🎵 tap to start music</div>
  </div>

  <script>
    (function() {
      // ----- STARS CANVAS -----
      const canvas = document.getElementById('starsCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let stars = [];

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', () => {
        resizeCanvas();
        initStars();
      });

      function initStars() {
        stars = [];
        const starCount = Math.floor((width * height) / 1800);
        for (let i = 0; i < starCount; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2.2 + 0.6,
            alpha: Math.random(),
            alphaSpeed: (Math.random() * 0.012 + 0.004),
            growing: true,
          });
        }
      }

      function drawStars() {
        ctx.clearRect(0, 0, width, height);
        for (let s of stars) {
          if (s.growing) {
            s.alpha += s.alphaSpeed;
            if (s.alpha >= 0.9) s.growing = false;
          } else {
            s.alpha -= s.alphaSpeed;
            if (s.alpha <= 0.15) s.growing = true;
          }
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 220, 240, ${s.alpha})`;
          ctx.shadowColor = '#ff99bb';
          ctx.shadowBlur = 8;
          ctx.fill();
        }
        requestAnimationFrame(drawStars);
      }

      resizeCanvas();
      initStars();
      drawStars();

      // ----- WEB AUDIO MUSIC (gentle romantic loop) -----
      let audioCtx = null;
      let musicPlaying = false;
      let masterGain = null;
      let musicInterval = null;
      const musicToggle = document.getElementById('musicToggle');

      function createMusic() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          masterGain = audioCtx.createGain();
          masterGain.gain.value = 0.25;
          masterGain.connect(audioCtx.destination);
        } catch (e) {
          console.warn("Web Audio not supported");
          musicToggle.textContent = "🎵 music unavailable";
          musicToggle.style.opacity = "0.6";
        }
      }

      function playNote(freq, startTime, duration, type = 'sine', vol = 0.16) {
        if (!audioCtx || !masterGain) return;
        const osc = audioCtx.createOscillator();
        const noteGain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        noteGain.gain.setValueAtTime(vol, startTime);
        noteGain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        osc.connect(noteGain);
        noteGain.connect(masterGain);
        osc.start(startTime);
        osc.stop(startTime + duration);
      }

      function startMelodyLoop() {
        if (!audioCtx || musicInterval) return;
        const now = audioCtx.currentTime;
        // dreamy chord progression: Cmaj7, Am9, Fmaj7, G7 (approximated with simple notes)
        const pattern = [
          { notes: [261.63, 329.63, 392.00, 493.88], dur: 1.8 }, // Cmaj7-ish
          { notes: [220.00, 277.18, 329.63, 440.00], dur: 1.8 }, // Am add9
          { notes: [349.23, 440.00, 523.25, 659.25], dur: 1.8 }, // Fmaj7
          { notes: [392.00, 493.88, 587.33, 783.99], dur: 1.8 }, // G7-ish
        ];
        let step = 0;
        function loop() {
          if (!audioCtx || !musicPlaying) return;
          const t = audioCtx.currentTime;
          const chord = pattern[step % pattern.length];
          chord.notes.forEach((freq, i) => {
            playNote(freq, t + i * 0.08, chord.dur * 0.9, i === 0 ? 'triangle' : 'sine', 0.12);
          });
          // soft bell accent
          playNote(chord.notes[0] * 2, t + 0.2, 0.7, 'sine', 0.07);
          step++;
        }
        loop();
        musicInterval = setInterval(loop, 1800);
      }

      function stopMusic() {
        if (musicInterval) {
          clearInterval(musicInterval);
          musicInterval = null;
        }
        if (masterGain) {
          masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
        }
        musicPlaying = false;
        musicToggle.textContent = "🎵 tap to start music";
      }

      function startMusic() {
        if (!audioCtx) {
          createMusic();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        if (masterGain) {
          masterGain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        }
        musicPlaying = true;
        musicToggle.textContent = "🎵 playing... (tap to pause)";
        startMelodyLoop();
      }

      musicToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        if (musicPlaying) {
          stopMusic();
        } else {
          startMusic();
        }
      });

      // first user interaction can resume audio context if needed
      document.body.addEventListener('click', () => {
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }, { once: true });

      // ----- BUTTON INTERACTIONS -----
      const yesBtn = document.getElementById('yesBtn');
      const noBtn = document.getElementById('noBtn');
      const responseDiv = document.getElementById('responseMessage');

      function showMessage(text, emoji = '💖') {
        responseDiv.style.opacity = '1';
        responseDiv.textContent = text + ' ' + emoji;
      }

      yesBtn.addEventListener('click', () => {
        showMessage("Yay no no no! You just made my whole universe brighter 💫", "🌠");
        // burst extra hearts effect
        createExtraHearts();
        if (!musicPlaying) startMusic();
        // disable no button shenanigans after yes
        noBtn.style.pointerEvents = 'none';
        noBtn.style.opacity = '0.5';
      });

      // playful "no" button that moves away
      noBtn.addEventListener('mouseover', (e) => {
        if (responseDiv.textContent.includes('Yay')) return;
        const btn = noBtn;
        const maxX = window.innerWidth - btn.offsetWidth - 20;
        const maxY = window.innerHeight - btn.offsetHeight - 20;
        const randomX = Math.max(10, Math.random() * maxX);
        const randomY = Math.max(10, Math.random() * maxY);
        btn.style.position = 'fixed';
        btn.style.left = randomX + 'px';
        btn.style.top = randomY + 'px';
        btn.style.zIndex = '999';
      });

      noBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (responseDiv.textContent.includes('Yay')) return;
        showMessage("Nice try... but the answer is already yes in my heart 😌", "💗");
        setTimeout(() => {
          if (!responseDiv.textContent.includes('Yay')) {
            responseDiv.style.opacity = '0';
          }
        }, 2500);
      });

      // extra floating hearts on yes
      function createExtraHearts() {
        const container = document.querySelector('.heart-container');
        for (let i = 0; i < 7; i++) {
          setTimeout(() => {
            const heartSpan = document.createElement('span');
            heartSpan.textContent = ['💗','💖','💘','💝','💕','✨','💞'][i % 7];
            heartSpan.style.position = 'fixed';
            heartSpan.style.fontSize = (2 + Math.random() * 2.5) + 'rem';
            heartSpan.style.left = Math.random() * 80 + 10 + '%';
            heartSpan.style.top = Math.random() * 60 + 20 + '%';
            heartSpan.style.zIndex = '1000';
            heartSpan.style.pointerEvents = 'none';
            heartSpan.style.animation = 'heartBeat 0.8s ease-out forwards';
            document.body.appendChild(heartSpan);
            setTimeout(() => heartSpan.remove(), 900);
          }, i * 120);
        }
      }

      // reset no button position if window resized
      window.addEventListener('resize', () => {
        if (noBtn.style.position === 'fixed') {
          noBtn.style.position = '';
          noBtn.style.left = '';
          noBtn.style.top = '';
        }
      });

      // Start music automatically on first user gesture (click anywhere) if not started
      document.body.addEventListener('click', function autoStartMusic() {
        if (!musicPlaying && audioCtx && audioCtx.state !== 'suspended') {
          startMusic();
        }
      }, { once: true });

    })();
  </script>
</body>
</html>
